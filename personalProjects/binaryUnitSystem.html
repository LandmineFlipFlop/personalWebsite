<script>
  function currentTime() {
    var d = new Date();
    var temp = 0;
    temp += d.getHours() * 3600;
    temp += d.getMinutes() * 60;
    temp += d.getSeconds();
    temp += d.getMilliseconds() * 0.001;
    temp = temp / 86400;
    var binary = temp.toString(2)
    binary = binary.substring(2,19)
    binary = binary.replaceAll("1", "┃")
    binary = binary.replaceAll("0", "╻")
    binary += "⠀"

    if (document.getElementById('binary').innerText != binary) {
      document.getElementById('binary').innerText = binary;
    }

    var time = ''
    if (d.getHours().toString().length === 1) {
      time += '0' + d.getHours()
    } else {
      time += d.getHours()
    }
    if (d.getMinutes().toString().length === 1) {
      time += ':0' + d.getMinutes()
    } else {
      time += ':' + d.getMinutes()
    }
    if (d.getSeconds().toString().length === 1) {
      time += ':0' + d.getSeconds()
    } else {
      time += ':' + d.getSeconds()
    }

    if (document.getElementById('decimal').innerText != time) {
      document.getElementById('decimal').innerText = time;
    }
  }
  setInterval(currentTime,50);
</script>
